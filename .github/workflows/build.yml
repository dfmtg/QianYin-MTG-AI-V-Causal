name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: QianYin-MTG-AI-V-Causal-Windows
            executable_ext: .exe
          - os: macos-latest
            artifact_name: QianYin-MTG-AI-V-Causal-macOS
            executable_ext: ''
          - os: ubuntu-latest
            artifact_name: QianYin-MTG-AI-V-Causal-Linux
            executable_ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller==5.13.2

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name "QianYin-MTG-AI-V-Causal" --add-data ".;." "MTG AI V-Causal.py"

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --name "QianYin-MTG-AI-V-Causal" --add-data ".;." "MTG AI V-Causal.py"

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --name "QianYin-MTG-AI-V-Causal" --add-data ".;." "MTG AI V-Causal.py"

      - name: Rename executable
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            mv "dist/QianYin-MTG-AI-V-Causal.exe" "dist/QianYin-MTG-AI-V-Causal-Windows.exe"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            mv "dist/QianYin-MTG-AI-V-Causal" "dist/QianYin-MTG-AI-V-Causal-macOS"
          else
            mv "dist/QianYin-MTG-AI-V-Causal" "dist/QianYin-MTG-AI-V-Causal-Linux"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
